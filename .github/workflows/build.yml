name: Build Photobooth Desktop App

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

env:
  PACKAGE_NAME: itec-photobooth

jobs:
  build:
    name: Paket bauen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Frontend bauen
        run: |
          npm ci
          npm run build

      - name: Paket zusammenstellen
        run: |
          mkdir -p release/${{ env.PACKAGE_NAME }}
          cp -r dist release/${{ env.PACKAGE_NAME }}/
          cp system_bridge.py start.sh release/${{ env.PACKAGE_NAME }}/
          chmod +x release/${{ env.PACKAGE_NAME }}/start.sh

      - name: ZIP erstellen
        run: cd release && zip -r ../${{ env.PACKAGE_NAME }}.zip ${{ env.PACKAGE_NAME }}

      - name: Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}
          path: ${{ env.PACKAGE_NAME }}.zip
          retention-days: 7

  release:
    name: GitHub Release erstellen
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Artifact herunterladen
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
