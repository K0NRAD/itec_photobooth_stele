name: Build Photobooth Desktop App

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

env:
  EXECUTABLE_NAME: itec-photobooth

jobs:
  # Job 1: Windows und macOS (Native Runner)
  build-os:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: Windows
          - os: macos-latest
            artifact_name: Mac_Silicon
          - os: macos-latest
            artifact_name: Mac_Intel
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Frontend bauen
        run: |
          npm ci
          npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_BUCKET: ${{ secrets.VITE_SUPABASE_BUCKET }}

      - uses: actions/setup-python@v5
        with: { python-version: '3.10' }

      - name: Abhängigkeiten installieren
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build (Windows / Mac Silicon)
        if: matrix.artifact_name != 'Mac_Intel'
        run: pyinstaller --noconfirm --distpath release system_bridge.spec

      - name: Build (Mac Intel)
        if: matrix.artifact_name == 'Mac_Intel'
        run: arch -x86_64 pyinstaller --noconfirm --distpath release system_bridge.spec

      - name: Executable-Bit setzen
        if: matrix.os != 'windows-latest'
        run: chmod +x release/${{ env.EXECUTABLE_NAME }}/${{ env.EXECUTABLE_NAME }} || true

      - name: Ad-hoc Code-Signierung (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          find "release/${{ env.EXECUTABLE_NAME }}" -type f \( -perm -111 -o -name "*.so" -o -name "*.dylib" \) -print0 |
            while IFS= read -r -d '' f; do
              codesign --force --sign - --timestamp=none "$f" 2>/dev/null || true
            done
          codesign --force --sign - --timestamp=none "release/${{ env.EXECUTABLE_NAME }}/${{ env.EXECUTABLE_NAME }}"

      - name: ZIP erstellen
        run: python -c "import shutil; shutil.make_archive('${{ env.EXECUTABLE_NAME }}-${{ matrix.artifact_name }}', 'zip', 'release/${{ env.EXECUTABLE_NAME }}')"

      - name: Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXECUTABLE_NAME }}-${{ matrix.artifact_name }}
          path: ${{ env.EXECUTABLE_NAME }}-${{ matrix.artifact_name }}.zip
          retention-days: 7

  # Job 2: Linux (Dedizierter Container)
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    container: ubuntu:26.04
    steps:
      - name: System-Pakete installieren
        run: |
          apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y \
            git python3 python3-pip python3-venv python3-dev \
            zip binutils

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: '20' }

      - name: Frontend bauen
        run: |
          npm ci
          npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_BUCKET: ${{ secrets.VITE_SUPABASE_BUCKET }}

      - name: Abhängigkeiten installieren
        run: |
          python3 -m venv /opt/buildenv
          /opt/buildenv/bin/pip install --upgrade pip
          /opt/buildenv/bin/pip install --no-cache-dir -r requirements.txt

      - name: PyInstaller Build (Linux)
        run: /opt/buildenv/bin/pyinstaller --noconfirm --distpath release system_bridge.spec

      - run: chmod +x release/${{ env.EXECUTABLE_NAME }}/${{ env.EXECUTABLE_NAME }}

      - run: /opt/buildenv/bin/python -c "import shutil; shutil.make_archive('${{ env.EXECUTABLE_NAME }}-Linux', 'zip', 'release/${{ env.EXECUTABLE_NAME }}')"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.EXECUTABLE_NAME }}-Linux
          path: ${{ env.EXECUTABLE_NAME }}-Linux.zip
          retention-days: 7

  # Job 3: Release (Nachdem alle Builds fertig sind)
  release:
    name: GitHub Release erstellen
    runs-on: ubuntu-latest
    needs: [build-os, build-linux]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Alle Artifacts herunterladen
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
